<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mi Patisserie</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <main id="container">
        <div class="wrapper-login">
            <form action="login.php" method="POST">
            <h1>Login</h1>

            <div class="input-box">
                <input type="text" placeholder="E-mail" required>
                <i class='bx bx-user' ></i>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Senha">
                <i class='bx bx-lock-alt' ></i>
            </div>

            <div class="remenber-forgot">
                <label><input type="checkbox"> Me lembre </label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="bnt"> Login </button>
            </form>
            <div class="register-link">
                <p>Não tem uma conta?
                <a href="javascript:void(0)" onclick="mostrarCadastro()">Registrar</a>
            </div>

        </div>

        <div class="wrapper-cadastro">
            <form action="cadastro.php" method="POST">
            <h1>Cadastro</h1>
            
            <div class="input-box">
                <input type="text" name="nome" placeholder="Nome" required>
                <i class="bx bx-user"></i>
            </div>

            <div class="input-box">
                <input type="text" name="email" placeholder="E-mail" required>
                <i class="bx bx-envelope"></i>
            </div>

            <div class="input-box">
                <input type="password" name="senha" placeholder="Senha" required>
                <i class='bx bx-lock-alt'></i>
            </div>

            <button class="bnt">Criar Conta</button>
            </form>
            <div class="register-link">
                <p>Já tem uma conta?
                <a href="#" onclick="voltarLogin()">Login</a></p>
            </div>

        </div>
        <img src="Logo.png" alt="logo" class="logo">

   </main>

   

   <script>

    function mostrarCadastro(){
        document.getElementById("container").classList.add("active")
    }

    function voltarLogin(){
        document.getElementById("container").classList.remove("active")
    }

   </script>
</body>
</html>
